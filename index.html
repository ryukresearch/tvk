<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a12">
<meta name="description" content="TVK 2026 Dashboard — Interactive explorer of Tamilaga Vettri Kazhagam's manifesto, 234 candidates, and constituency battleground map.">
<title>TVK 2026 · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="css/styles.css?v=21">
</head>
<body>
<div class="app">
  <!-- ══ HEADER ══ -->
  <div class="hdr">
    <div class="hdr-top">
      <div class="brand">
        <div class="logo"><img src="assets/tvk-logo.jpg?v=2" alt="TVK" loading="eager" decoding="async"></div>
        <div class="brand-text">
          <h1 data-t="brand_title">TVK 2026 Dashboard</h1>
          <p data-t="brand_sub">234 SEATS · WHISTLE REVOLUTION</p>
        </div>
      </div>
      <div class="hdr-tools">
        <button class="tool-btn lang-btn" onclick="toggleLang()" id="langBtn" title="Language">EN</button>
        <button class="tool-btn" onclick="toggleTheme()" id="themeBtn" title="Theme">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button class="tool-btn" onclick="doShare()" title="Share">
          <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        </button>
      </div>
    </div>
    <div class="stats-bar" id="statsBar"></div>
  </div>

  <!-- ══ BODY: sidebar + main ══ -->
  <div class="body-row">
    <aside class="sidebar">
      <div class="side-title" data-t="nav_label">Navigate</div>
      <div class="side-nav">
        <button class="side-item on" onclick="switchTab(0)" data-idx="0">
          <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
          <span data-t="tab_pulse">Pulse</span><span class="kbd">1</span>
        </button>
        <button class="side-item" onclick="switchTab(1)" data-idx="1">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span data-t="tab_promises">Promises</span><span class="kbd">2</span>
        </button>
        <button class="side-item" onclick="switchTab(2)" data-idx="2">
          <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span data-t="tab_map">Map</span><span class="kbd">3</span>
        </button>
        <button class="side-item" onclick="switchTab(3)" data-idx="3">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg>
          <span data-t="tab_candidates">Candidates</span><span class="kbd">4</span>
        </button>
      </div>
      <a class="side-foot" href="https://x.com/ryuk_nl" target="_blank" rel="noopener noreferrer">made by <span>RYUK</span></a>
    </aside>

    <div class="main">
      <div class="tc" id="tab0"></div>
      <div class="tc hidden" id="tab1"></div>
      <div class="tc hidden" id="tab2"></div>
      <div class="tc hidden" id="tab3"></div>
    </div>
  </div>

  <!-- ══ BOTTOM NAV (mobile) ══ -->
  <div class="bnav">
    <button class="on" onclick="switchTab(0)">
      <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      <span data-t="tab_pulse">Pulse</span>
    </button>
    <button onclick="switchTab(1)">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span data-t="tab_promises">Promises</span>
    </button>
    <button onclick="switchTab(2)">
      <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span data-t="tab_map">Map</span>
    </button>
    <button onclick="switchTab(3)">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg>
      <span data-t="tab_candidates">Candidates</span>
    </button>
  </div>
</div>

<!-- ══ MODAL + TOAST ══ -->
<div class="modal" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modalBox"></div>
</div>
<div class="toast" id="toast"></div>

<!-- ══ SCRIPTS — order matters ══ -->
<!-- 1. Data layer -->
<script src="js/data/constituencies.js"></script>
<script src="js/data/promises.js"></script>
<script src="js/data/elections.js"></script>
<script src="js/data/i18n.js"></script>
<!-- 2. Tab builders (must load before core.js init) -->
<script src="js/tabs/pulse.js"></script>
<script src="js/tabs/promises.js"></script>
<script src="js/tabs/map.js"></script>
<script src="js/tabs/candidates.js"></script>
<script src="js/tabs/myman.js"></script>
<!-- 3. Core (state + init) -->
<script src="js/core.js"></script>
</body>
</html>
